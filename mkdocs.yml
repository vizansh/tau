site_name: Tau
site_description: A Python implementation of a minimalist Pi-style coding-agent harness.
site_url: https://alejandro-ao.github.io/tau/
repo_name: alejandro-ao/tau
repo_url: https://github.com/alejandro-ao/tau
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Alejandro AO

extra_css:
  - assets/landing.css

extra_javascript:
  - assets/landing.js

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

