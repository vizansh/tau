site_name: Tau
site_description: A Python implementation of a minimalist Pi-style coding-agent harness.
site_url: https://alejandro-ao.github.io/tau/
repo_name: alejandro-ao/tau
repo_url: https://github.com/alejandro-ao/tau
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Alejandro AO

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Providers: providers.md
  - Agent Loop: agent-loop.md
  - Agent Harness: harness.md
  - Design:
      - Roadmap: 00-roadmap.md
      - Architecture Overview: 01-architecture.md
      - Agent Loop: 02-agent-loop.md
      - Tools: 03-tools.md
      - Sessions: 04-sessions.md
      - Core Types and Events: 05-core-types-and-events.md
  - Architecture Notes:
      - Overview: architecture/index.md
      - "Phase 1: Core Types and Events": architecture/phase-1-core-types-and-events.md
      - "Phase 2: AI Provider Layer": architecture/phase-2-ai-provider-layer.md
      - "Phase 3: Pure Agent Loop": architecture/phase-3-agent-loop.md
      - "Phase 4: AgentHarness": architecture/phase-4-agent-harness.md
      - "Phase 5: Built-in Coding Tools": architecture/phase-5-coding-tools.md
      - "Phase 6: Non-interactive Print-mode CLI": architecture/phase-6-print-mode-cli.md
      - "Phase 7: Session Tree and JSONL Persistence": architecture/phase-7-session-tree.md
      - "Phase 8: Coding Session Wrapper": architecture/phase-8-coding-session.md
      - "Phase 9: Skills and Prompt Templates": architecture/phase-9-skills-prompts.md
      - "Phase 10: System Prompt Assembly": architecture/phase-10-system-prompt.md
      - "Phase 11: Print and Event Rendering Modes": architecture/phase-11-print-event-rendering.md
      - "Phase 12: Textual TUI": architecture/phase-12-textual-tui.md
  - ADRs:
      - Use Textual for TUI: adr/0001-use-textual-for-tui.md
